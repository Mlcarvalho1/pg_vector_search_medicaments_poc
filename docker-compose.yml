version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: postgres-local
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    container_name: ollama-local
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      OLLAMA_NUM_PARALLEL: "5"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:11434/api/tags || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  ollama-init:
    image: ollama/ollama:latest
    depends_on:
      ollama:
        condition: service_healthy
    volumes:
      - ollama_data:/root/.ollama
    entrypoint: ["ollama", "pull", "nomic-embed-text"]
    environment:
      OLLAMA_HOST: http://ollama:11434
    restart: on-failure

  mongodb:
    image: mongo:7
    container_name: mongodb-local
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: mongo
      MONGO_INITDB_ROOT_PASSWORD: mongo
      MONGO_INITDB_DATABASE: admin
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  pgvector-search:
    build:
      context: ./tools
      dockerfile: Dockerfile
    container_name: pgvector-search
    depends_on:
      postgres:
        condition: service_started
      ollama:
        condition: service_healthy
    environment:
      DATABASE_URL: "host=postgres dbname=postgres user=postgres password=postgres port=5432"
      OLLAMA_HOST: "http://ollama:11434"
    profiles:
      - tools

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: medicaments-api
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_started
      ollama:
        condition: service_healthy
    environment:
      DATABASE_URL: "host=postgres dbname=postgres user=postgres password=postgres port=5432"
      OLLAMA_HOST: "http://ollama:11434"
    restart: unless-stopped

volumes:
  postgres_data:
  mongo_data:
  ollama_data: